name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

# Queue deploys on the same branch so they run in order (no cancellation).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build (OpenNext + Next.js)
        env:
          NEXT_PUBLIC_SITE_URL: https://www.terryum.ai
          NEXT_PUBLIC_SITE_NAME: Terry Um
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_R2_URL: ${{ secrets.NEXT_PUBLIC_R2_URL }}
          NEXT_PUBLIC_SUBSTACK_EN_URL: ${{ secrets.NEXT_PUBLIC_SUBSTACK_EN_URL }}
          NEXT_PUBLIC_SUBSTACK_KO_URL: ${{ secrets.NEXT_PUBLIC_SUBSTACK_KO_URL }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build:cf

      - name: Verify prerender manifest covers all public posts
        run: node scripts/ci-verify-prerender.mjs

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # R2 batch upload (rclone) for incremental-cache populate.
          # With all three set, opennextjs-cloudflare 1.11.0 uses a single
          # bulk upload instead of 151 sequential wrangler r2 puts —
          # cuts the deploy step from ~5 min to ~30 sec.
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx opennextjs-cloudflare deploy
