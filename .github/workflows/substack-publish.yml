name: Publish to Substack

on:
  push:
    branches:
      - main
    paths:
      - 'posts/index.json'
  workflow_dispatch:
    inputs:
      slug:
        description: '특정 포스트 slug (비워두면 최신 미발행 포스트 자동 선택)'
        required: false
        default: ''
      dry_run:
        description: '실제 발행 없이 미리보기만 (true/false)'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install substack-api

      - name: Publish to Substack
        env:
          SUBSTACK_EMAIL: ${{ secrets.SUBSTACK_EMAIL }}
          SUBSTACK_PASSWORD: ${{ secrets.SUBSTACK_PASSWORD }}
          NEXT_PUBLIC_SUBSTACK_EN_URL: ${{ secrets.SUBSTACK_EN_URL }}
          NEXT_PUBLIC_SUBSTACK_KO_URL: ${{ secrets.SUBSTACK_KO_URL }}
          SITE_BASE_URL: https://onthemanifold.com
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.slug }}" != "" ]; then
            ARGS="$ARGS --slug=${{ github.event.inputs.slug }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/publish-substack.py $ARGS
